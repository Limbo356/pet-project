<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Изменение пользователя</title>
    <link rel="icon" href="../ico/Open Book.png">
    <link rel="stylesheet" href="../css/style_editPage.css">
</head>
<body>
    <a href="../html/admin.html" class="back-admin-btn">← Назад в админ-панель</a>

    <div id="tableUser" class="page">
        <div class="window-header">
                <h1>Изменение пользователя</h1>
                <p>Редактирование данных User и UserLogin</p>
            </div>

            <div class="edit-form">

                <div class="section-title">Основная информация</div>

                <div class="form-group">
                    <label for="userId">ID пользователя</label>
                    <input type="text" id="userId" placeholder="Например: 1">
                </div>

                <div class="form-group">
                    <label for="userName">Имя</label>
                    <input type="text" id="userName" placeholder="Введите имя пользователя">
                </div>

                <div class="form-group">
                    <label for="userName">Фамилия</label>
                    <input type="text" id="userSurName" placeholder="Введите фамилию пользователя">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="userAge">Возраст</label>
                        <input type="number" id="userAge" placeholder="18">
                    </div>

                    <div class="form-group">
                        <label for="userPhone">Телефон</label>
                        <input type="tel" id="userPhone" placeholder="87001234567">
                    </div>
                </div>

                <div class="form-row">
                    <label for="downloadToday">Скачано сегодня</label>
                    <input type="number" id="downloadToday" placeholder="0">
                </div>

                <div class="form-group">
                    <label for="BirthdayDate">Дата Рождения</label>
                    <input type="date" id="BirthdayDate">
                </div>

                <div class="form-group">
                    <label for="lastDownloadDate">Дата последней загрузки</label>
                    <input type="date" id="lastDownloadDate">
                </div>

                <div class="section-title">Данные входа</div>

                <div class="form-group">
                    <label for="emailUser">Email</label>
                    <input type="email" id="emailUser" placeholder="example@mail.com" >
                </div>

                <div class="form-group">
                    <label for="passwordUser">Пароль</label>

                    <div class="password-input-wrapper">
                        <input type="password" id="passwordUser" placeholder="Введите пароль">
                        
                        <label class="show-password-toggle">
                            <input type="checkbox" id="showPassword">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <div class="button-group">
                    <button id="btSaveUpdateInfo" type="submit" class="btn btn-save">Сохранить</button>
                    <button id="btResetInfo" type="reset" class="btn btn-cancel">Очистить</button>
                </div>
            </div>
        </div>
    </div>
</body>

<script src="../js/edit_User.js">
</script>
</html>
