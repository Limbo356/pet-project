<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля</title>

    <link rel="icon" href="../ico/Open Book.png">
    <link rel="stylesheet" href="../css/style_forgot_password.css">
</head>

<body>
    <div class="reset-window">
        <h1>Восстановление пароля</h1>
        <p>
            Введите email и новый пароль для восстановления доступа
        </p>
        <form>
            <input type="email" placeholder="Email"required>
            <input type="password" placeholder="Новый пароль"required>
            <input type="password" placeholder="Повторите пароль"required>

            <input type="submit" class="submit" value="Сменить пароль">

        </form>

        <a href="../html/registration.html" class="back-link">
            ← Вернуться к входу
        </a>
    </div>
</body>
</html>
